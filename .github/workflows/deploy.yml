name: Deploy digital-signage-app
on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-digital-signage
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync source (excl. uploads / node_modules / .env)
        run: |
          rsync -avz --delete \
            --exclude 'uploads/' --exclude 'node_modules/' \
            --exclude '.git' --exclude '.github' --exclude '.env' \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/digital-signage-app/

      - name: Rebuild & restart
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            cd /var/www/digital-signage-app
            if [ -f docker-compose.yml ]; then
              /usr/bin/docker compose build
              /usr/bin/docker compose up -d
            fi
            sudo /usr/bin/systemctl restart digital-signage.service
          '