version: '3.8'

services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
        VITE_APP_TITLE: ${VITE_APP_TITLE:-Digital Signage}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
